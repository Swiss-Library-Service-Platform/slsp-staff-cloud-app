<mat-tab-group [mat-stretch-tabs]="true">
	<mat-tab>
		<ng-template mat-tab-label>
			<mat-icon>join_inner</mat-icon>
			<span>{{ 'tabs.linkAccounts' | translate }}</span>
		</ng-template>
		<app-link-accounts />
	</mat-tab>
	<mat-tab>
		<ng-template mat-tab-label>
			<mat-icon>people</mat-icon>
			<span>{{ 'tabs.listUsers' | translate }}</span>
		</ng-template>
		<app-list-users />
	</mat-tab>
	<mat-tab>
		<ng-template mat-tab-label>
			<mat-icon>workspaces</mat-icon>
			<span>{{ 'tabs.groups' | translate }}</span>
		</ng-template>
		<app-groups />
	</mat-tab>
</mat-tab-group>
