<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
	<p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
	<button mat-stroked-button (click)="onCancel()">
		{{ data.cancelLabel }}
	</button>
	<button
		mat-flat-button
		[color]="data.confirmColor || 'primary'"
		(click)="onConfirm()"
	>
		{{ data.confirmLabel }}
	</button>
</mat-dialog-actions>
